services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: magic-portfolio:latest
    container_name: magic-portfolio
    restart: unless-stopped
    pull_policy: build
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/check-auth"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
